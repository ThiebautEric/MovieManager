# Déploiement automatique : chaque push sur main compile Flutter web et
# publie build/web sur le projet Cloudflare Pages « theyellowframe ».
# Secrets requis (Settings > Secrets and variables > Actions) :
#   CLOUDFLARE_API_TOKEN  — jeton API avec la permission Account > Cloudflare Pages > Edit
#   CLOUDFLARE_ACCOUNT_ID — identifiant du compte Cloudflare
# Les --dart-define ci-dessous sont des clés publiques par nature (présentes
# dans le bundle JS servi au navigateur) ; la sécurité repose sur les RLS.
name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: >
          flutter build web --release
          --dart-define=TMDB_TOKEN=3889808a354ed5f7476794b8b4abc105
          --dart-define=SUPABASE_URL=https://msawdukkcgjkxfktthdj.supabase.co
          --dart-define=SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zYXdkdWtrY2dqa3hma3R0aGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTU3MjAsImV4cCI6MjA5NzE5MTcyMH0.0UG-Fd0SxpZM2CbVmU2e301E6UqYI8jCexurqGUVxSY

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=theyellowframe --branch=main
